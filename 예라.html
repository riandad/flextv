<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEX TV 퍼즐 뽑기판 (오류수정본)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --flex-purple: #8e44ad; --flex-pink: #ff00ea; 
            --gold: #ffcc00; --silver: #e0e0e0; --bronze: #cd7f32; 
            --bg: #0a0a0a;
            --p-light: #ffdae3;
            --p-accent: #ff8df7;
            /* 이미지 경로 */
            --banner-image: url('https://nwqkk6zh13414.edge.naverncp.com/etc/19g61m2izfiaf.jpg');
            --hidden-image: url('https://nwqkk6zh13414.edge.naverncp.com/board/746608/19g61mlg2yfa2.png'); 
        }

        body { background-color: var(--bg); color: white; font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .top-banner { width: 100%; max-width: 1000px; height: 160px; background: var(--banner-image) no-repeat center/contain; margin-bottom: 5px; }

        /* 대시보드 */
        .dashboard { background: rgba(0,0,0,0.8); padding: 10px 25px; border-radius: 50px; border: 2px solid var(--flex-purple); margin-bottom: 10px; display: flex; gap: 20px; align-items: center; }
        .stat-item strong { color: var(--gold); font-size: 1.2em; }
        .controls { margin-bottom: 10px; }
        button { padding: 7px 18px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; margin: 0 3px; transition: 0.2s; }
        .btn-pick { background: var(--flex-purple); color: white; }
        .btn-random { background: var(--flex-pink); color: white; }

        .main-container { display: flex; width: 98vw; justify-content: center; gap: 15px; align-items: flex-start; }
        .sidebar { width: 180px; background: rgba(0,0,0,0.9); border: 1px solid #333; border-radius: 12px; padding: 12px; height: 650px; overflow-y: auto; }

        /* [수정] 보드판 레이아웃 안정화 */
        #board { 
            display: grid; 
            grid-template-columns: repeat(20, 1fr); 
            gap: 1px; 
            width: 60vw; min-width: 750px; 
            background: #1a1a1a; padding: 3px; border-radius: 6px;
            position: relative;
        }

        .cell { 
            aspect-ratio: 1/1; 
            background: var(--p-light); 
            color: #9F0A28; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: 900; 
            cursor: pointer; 
            /* 숫자 가독성 테두리 */
            text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, -1.5px 1.5px 0 #fff, 1.5px 1.5px 0 #fff;
            transition: transform 0.1s, background-color 0.1s;
        }
        .cell:hover { background: #ffb6c1; transform: scale(1.1); z-index: 5; }

        /* [핵심 수정] 퍼즐 조각 스타일 - 깜빡임 방지 및 정밀 좌표 */
        .cell.open { 
            background-image: var(--hidden-image) !important;
            background-repeat: no-repeat;
            background-color: transparent !important; /* 배경색 제거로 깜빡임 완화 */
            color: transparent; 
            text-shadow: none;
            border: none;
            position: relative;
            filter: brightness(3.0);
        }

        /* 꽝 가독성 강화 */
        .cell.open.is-miss::after {
            content: "꽝";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); /* 이미지가 보여야 하므로 약간 투명하게 */
            color: #ff2226;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 900;
        }

        /* 당첨 시 등수 표기 가독성 */
        .rank-text { 
            position: absolute; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 13px; z-index: 2;
        }

        .log-box { width: 95%; max-width: 1200px; margin-top: 15px; background: rgba(0,0,0,0.9); padding: 12px; height: 100px; overflow-y: auto; font-size: 13px; border-radius: 12px; border: 1px solid #333; }
        #effectOverlay { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:9999; padding:40px; border-radius:20px; text-align:center; transition:0.3s; pointer-events:none; font-weight: 900; }
        .settings-panel { background: rgba(20, 20, 20, 0.98); border: 2px solid var(--flex-purple); padding: 20px; border-radius: 15px; margin-bottom: 15px; width: 90%; max-width: 600px; display: none; z-index: 100; position: fixed; top: 80px; box-shadow: 0 0 40px rgba(0,0,0,1); }
        .settings-panel.show { display: block; }
    </style>
</head>
<body>

    <div class="top-banner"></div>

    <div class="settings-panel" id="settingsPanel">
        <h3 style="text-align:center; color:var(--gold);">⚙️ 상품 명칭 및 수량 설정</h3>
        <div id="setRows"></div>
        <button onclick="saveSettings()" style="background:var(--flex-purple); color:white; width:100%; padding:12px; margin-top:10px;">설정 저장</button>
    </div>

    <div class="dashboard">
        <button onclick="toggleSettings()" style="background:#333; color:white;">⚙️ 상품 수정</button>
        <div class="stat-item">남은 칸: <strong id="totalLeft">520</strong></div>
    </div>

    <div class="controls">
        <input id="targetNum" type="number" style="width:70px; padding:8px; background:#000; color:white; border:2px solid var(--flex-purple); text-align:center;" placeholder="번호">
        <button class="btn-pick" onclick="manualPick()">뽑기</button>
        <button class="btn-random" onclick="startRoulette()">🎲 랜덤</button>
        <button onclick="resetBoard()" style="font-size:11px; color:#777; background:none;">판 초기화</button>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <h4 style="text-align:center; color:var(--flex-pink);">참여자</h4>
            <input type="text" id="newUser" style="width:100%; background:#111; color:white; border:1px solid #444; padding:8px; border-radius:5px;" placeholder="닉네임" onkeypress="if(event.keyCode==13) addUser()">
            <div id="userList"></div>
        </div>

        <div id="board"></div>

        <div class="sidebar">
            <h4 style="text-align:center; color:var(--gold);">🎁 현황</h4>
            <div id="giftStatusList" style="font-size:12px;"></div>
            <h4 style="text-align:center; color:var(--flex-pink); margin-top:20px;">🏆 TOP 5</h4>
            <div id="leaderboard"></div>
        </div>
    </div>

    <div class="log-box" id="logBox"></div>
    <div id="effectOverlay"></div>

<script>
    const COLS = 20; const ROWS = 26; const TOTAL = 520;
    let rewards = []; let userStats = {}; let activeUser = null;
    let gifts = { g1: "🥇 1등", c1: 1, g2: "🥈 2등", c2: 3, g3: "🥉 3등", c3: 15, g4: "🏅 4등", c4: 80 };

    // [추가] 이미지 미리 불러오기 (깜빡임 방지)
    const preloadImg = new Image();
    preloadImg.src = 'https://nwqkk6zh13414.edge.naverncp.com/board/746608/19g61mlg2yfa2.png';

    function init() {
        const sGifts = localStorage.getItem("eb_puzzle_gifts_v2");
        if (sGifts) gifts = JSON.parse(sGifts);
        loadSetUI();
        const sBoard = localStorage.getItem("eb_puzzle_board_v2");
        const sStats = localStorage.getItem("eb_puzzle_stats_v2");
        if (sBoard) rewards = JSON.parse(sBoard); else resetRewards();
        if (sStats) userStats = JSON.parse(sStats);
        renderBoard(); renderUserList(); updateLeaderboard(); updateStats();
    }

    function loadSetUI() {
        let html = '';
        for(let i=1; i<=4; i++) {
            html += `<div style="display:flex; gap:10px; margin-bottom:8px;"><span>${i}등:</span><input type="text" id="gift${i}" value="${gifts['g'+i]}" style="flex:3; background:#000; color:#fff; border:1px solid #444; font-size:12px;"><input type="number" id="count${i}" value="${gifts['c'+i]}" style="flex:1; background:#000; color:var(--gold); border:1px solid #444; font-size:12px;"></div>`;
        }
        document.getElementById("setRows").innerHTML = html;
    }

    function toggleSettings() { document.getElementById("settingsPanel").classList.toggle("show"); }
    function saveSettings() {
        for(let i=1; i<=4; i++) { gifts['g'+i] = document.getElementById('gift'+i).value; gifts['c'+i] = parseInt(document.getElementById('count'+i).value) || 0; }
        localStorage.setItem("eb_puzzle_gifts_v2", JSON.stringify(gifts));
        toggleSettings(); updateStats(); alert("저장되었습니다. 판 초기화를 해주세요.");
    }

    function resetRewards() {
        let temp = [];
        for(let i=1; i<=4; i++) temp = temp.concat(Array(gifts['c'+i]).fill(`R${i}_${gifts['g'+i]}`));
        while (temp.length < TOTAL) temp.push("MISS_꽝");
        rewards = temp.sort(() => Math.random() - 0.5);
        localStorage.setItem("eb_puzzle_board_v2", JSON.stringify(rewards));
    }

    function renderBoard() {
        const board = document.getElementById("board"); board.innerHTML = "";
        rewards.forEach((res, i) => {
            const div = document.createElement("div"); div.className = "cell";
            const x = i % COLS; const y = Math.floor(i / COLS);
            
            if (res.startsWith("O_")) {
                div.classList.add("open");
                // [수정] 수학적으로 더 정확한 좌표 계산 (퍼즐 맞춤형)
                div.style.backgroundSize = `${COLS * 100}% ${ROWS * 100}%`;
                const posX = (x / (COLS - 1)) * 100;
                const posY = (y / (ROWS - 1)) * 100;
                div.style.backgroundPosition = `${posX}% ${posY}%`;
                
                let val = res.replace("O_", "");
                if (val.startsWith("MISS")) {
                    div.classList.add("is-miss");
                } else {
                    const span = document.createElement("div"); span.className = "rank-text";
                    if(val.startsWith("R1")) { span.innerText = "1등"; span.style.color = "var(--gold)"; }
                    else if(val.startsWith("R2")) { span.innerText = "2등"; span.style.color = "var(--silver)"; }
                    else if(val.startsWith("R3")) { span.innerText = "3등"; span.style.color = "#B906"; }
                    else { span.innerText = "4등"; span.style.color = "#A841DB"; }
                    div.appendChild(span);
                }
            } else {
                div.innerText = i + 1;
                div.onclick = () => openCell(i);
            }
            board.appendChild(div);
        });
    }

    function openCell(idx) {
        if (!activeUser) { showPopup("참여자 선택!", "#ff3333"); return; }
        if (rewards[idx].startsWith("O_")) return;
        const raw = rewards[idx]; rewards[idx] = "O_" + raw; userStats[activeUser]++;
        saveAll();
        let cleanText = "", color = "#fff";
        if (raw.startsWith("R1")) { cleanText = gifts.g1; color = "var(--gold)"; fire(3); }
        else if (raw.startsWith("R2")) { cleanText = gifts.g2; color = "var(--silver)"; fire(1); }
        else if (raw.startsWith("R3")) { cleanText = gifts.g3; color = "var(--bronze)"; fire(1); }
        else if (raw.startsWith("R4")) { cleanText = gifts.g4; color = "#ff8df7"; }
        else { cleanText = "꽝"; color = "#fff"; }
        addLog(activeUser, idx+1, cleanText);
        showPopup(cleanText + (cleanText==="꽝"?"":"! 🎉"), color);
        renderBoard(); updateLeaderboard(); updateStats();
    }

    // [기능 함수들]
    function addUser() {
        const name = document.getElementById("newUser").value.trim();
        if (name && !userStats[name]) { userStats[name] = 0; saveAll(); renderUserList(); document.getElementById("newUser").value = ""; }
    }
    function selectUser(name) { activeUser = name; renderUserList(); }
    function renderUserList() {
        const list = document.getElementById("userList"); list.innerHTML = "";
        Object.keys(userStats).forEach(name => {
            const div = document.createElement("div");
            div.style.cssText = `padding:8px; margin:5px 0; background:${activeUser===name?'var(--flex-purple)':'#222'}; border-radius:5px; cursor:pointer; text-align:center; font-size:13px; font-weight:bold;`;
            div.innerText = name; div.onclick = () => selectUser(name); list.appendChild(div);
        });
    }
    function fire(n) { for(let i=0; i<n; i++) setTimeout(()=>confetti({particleCount:100, spread:70, origin:{y:0.6}}), i*300); }
    function addLog(u, n, r) {
        const box = document.getElementById("logBox"); const e = document.createElement("div");
        e.innerHTML = `<span style="color:#666">[${new Date().toLocaleTimeString()}]</span> <b>${u}</b>님 <span style="color:var(--gold)">${n}번</span> 👉 ${r}`;
        box.prepend(e);
    }
    function updateStats() {
        document.getElementById("totalLeft").innerText = rewards.filter(r => !r.startsWith("O_")).length;
        let html = ''; const colors = ["var(--gold)", "var(--silver)", "var(--bronze)", "#ff8df7"];
        for(let i=1; i<=4; i++) {
            const count = rewards.filter(r => r.startsWith('R'+i+'_')).length;
            html += `<div style="color:${colors[i-1]}; margin-bottom:5px;">${i}등: <span>${count}</span></div>`;
        }
        document.getElementById("giftStatusList").innerHTML = html;
    }
    function updateLeaderboard() {
        const b = document.getElementById("leaderboard"); b.innerHTML = "";
        Object.entries(userStats).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach((item, i) => {
            const d = document.createElement("div"); d.style.cssText = "display:flex; justify-content:space-between; font-size:12px; padding:6px 0; border-bottom:1px solid #222;";
            d.innerHTML = `<span style="color:var(--gold)">${i+1}</span><span>${item[0]}</span><span style="color:var(--flex-pink)">${item[1]}회</span>`;
            b.appendChild(d);
        });
    }
    function manualPick() { const v = parseInt(document.getElementById("targetNum").value); if (v>=1 && v<=TOTAL) openCell(v-1); document.getElementById("targetNum").value=""; }
    function startRoulette() {
        if (!activeUser) { showPopup("참여자 선택!", "#ff3333"); return; }
        let avail = rewards.map((r, i) => r.startsWith("O_") ? -1 : i).filter(i => i !== -1);
        if (avail.length === 0) return;
        let count = 0, spins = 20;
        const timer = setInterval(() => {
            document.querySelectorAll(".cell").forEach(c => c.style.outline = "none");
            let rIdx = avail[Math.floor(Math.random() * avail.length)];
            document.querySelectorAll(".cell")[rIdx].style.outline = "2px solid white";
            if (++count > spins) { clearInterval(timer); document.querySelectorAll(".cell")[rIdx].style.outline = "none"; openCell(rIdx); }
        }, 60);
    }
    function saveAll() { localStorage.setItem("eb_puzzle_board_v2", JSON.stringify(rewards)); localStorage.setItem("eb_puzzle_stats_v2", JSON.stringify(userStats)); }
    function resetBoard() { if(confirm("초기화할까요?")) { resetRewards(); location.reload(); } }
    function showPopup(m, color) {
        const o = document.getElementById("effectOverlay"); o.innerText = m;
        o.style.cssText = `position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(1); background:rgba(0,0,0,0.95); border:4px solid ${color}; color:${color}; font-size:45px; padding:50px; border-radius:25px; z-index:9999; transition:0.3s; box-shadow: 0 0 30px ${color}; font-weight:900;`;
        setTimeout(() => o.style.transform = "translate(-50%,-50%) scale(0)", 1500);
    }
    init();
</script>
</body>
</html>
