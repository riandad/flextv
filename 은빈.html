<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEX TV 은빈ღ 뽑기판 (배너형)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --flex-purple: #6a11cb;
            --flex-pink: #ff00ea;
            --gold: #ffcc00;
            --red: #ff3333;
            --bg: #121212;
            --hidden-image: url('https://nwqkk6zh13414.edge.naverncp.com/board/579442/19g61m6q7him2.jpg'); 
            --banner-image: url('https://nwqkk6zh13414.edge.naverncp.com/etc/19g61lvamalrr.jpg');
        }

        body { 
            background-color: var(--bg); color: white; 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* [추가] 상단 배너 스타일 */
        .top-banner {
            width: 100%;
            max-width: 1200px;
            height: 200px; /* 이미지 비율에 맞춰 높이 조절 */
            background-image: var(--banner-image);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        h1 { font-size: 28px; color: var(--flex-pink); margin: 5px 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        .current-user { font-size: 20px; color: var(--gold); font-weight: bold; margin-bottom: 10px; }

        .dashboard { 
            background: rgba(0, 0, 0, 0.7); padding: 10px 25px; 
            border-radius: 50px; margin-bottom: 15px; border: 2px solid var(--flex-purple);
            display: flex; gap: 20px;
        }
        .stat-item { font-size: 16px; }
        .stat-item strong { color: var(--gold); font-size: 20px; }

        .controls { margin-bottom: 15px; }
        input[type="number"] { background: #000; border: 2px solid var(--flex-purple); color: white; padding: 8px; border-radius: 5px; width: 70px; text-align: center; font-size: 16px; }
        button { padding: 8px 20px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; margin: 0 5px; font-size: 16px; }
        .btn-pick { background: var(--flex-purple); color: white; }
        .btn-random { background: var(--flex-pink); color: white; }
        .btn-reset { background: #333; color: #888; font-size: 12px; }

        .main-container { display: flex; width: 98vw; justify-content: center; gap: 15px; align-items: flex-start; }
        
        .sidebar { width: 180px; background: rgba(0,0,0,0.85); border: 1px solid #333; border-radius: 15px; padding: 15px; height: 500px; overflow-y: auto; }
        .sidebar h3 { font-size: 16px; color: var(--flex-pink); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }

        .user-item { padding: 8px; margin: 5px 0; background: #222; border-radius: 5px; cursor: pointer; text-align: center; font-size: 13px; }
        .user-item.active { background: var(--flex-purple); font-weight: bold; box-shadow: 0 0 10px var(--flex-purple); }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px; }

        #board { 
            display: grid; grid-template-columns: repeat(26, 1fr); gap: 1px; 
            width: 65vw; max-width: 1400px;
            background-image: var(--hidden-image); background-size: cover; background-position: center; 
            border-radius: 8px; background-color: #000; padding: 5px;
        }
        .cell { aspect-ratio: 1/1; background: #2d2d2d; color: #777; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .cell.open { background: rgba(0, 0, 0, 0.2) !important; color: transparent; border: 1px solid rgba(255,255,255,0.1); }
        .cell.win-text { color: white !important; font-size: 12px; text-shadow: 0 0 5px #000; }
        .cell.miss-text { color: var(--red) !important; font-size: 10px; font-weight: 900; }
        .highlight { background: #fff !important; color: #000 !important; transform: scale(1.3); z-index: 10; border-radius: 50%; }

        .log-box { width: 90%; max-width: 1200px; margin-top: 20px; background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 10px; padding: 15px; height: 120px; overflow-y: auto; text-align: left; font-size: 13px; }
        
        #effectOverlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 10000; padding: 40px 60px; border-radius: 30px; text-align: center; transition: 0.3s; pointer-events: none; }
        #effectOverlay.show { transform: translate(-50%, -50%) scale(1); }
        .msg-win { background: rgba(0,0,0,0.95); border: 4px solid var(--gold); color: var(--gold); font-size: 45px; font-weight: bold; }
        .msg-miss { background: rgba(0,0,0,0.85); border: 2px solid #555; color: #ccc; font-size: 35px; }
        .msg-error { background: #900; color: white; font-size: 25px; }
    </style>
</head>
<body>

    <div class="top-banner"></div>

    <div class="current-user" id="currentUserDisplay">참여자를 선택해주세요</div>

    <div class="dashboard">
        <div class="stat-item">남은 칸: <strong id="totalLeft">520</strong></div>
        <div class="stat-item">1등: <strong id="cnt1">1</strong> / 2등: <strong id="cnt2">3</strong> / 3등: <strong id="cnt3">15</strong></div>
    </div>

    <div class="controls">
        <input id="targetNum" type="number" placeholder="번호" min="1" max="520">
        <button class="btn-pick" onclick="manualPick()">뽑기</button>
        <button class="btn-random" onclick="startRoulette()">🎲 랜덤</button>
        <button class="btn-reset" onclick="resetBoard()">초기화</button>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <h3>참여자 등록</h3>
            <input type="text" id="newUserField" style="width:100%; padding:5px; margin-bottom:5px; background:#000; color:white; border:1px solid #444;" placeholder="닉네임" onkeypress="if(event.keyCode==13) addUser()">
            <button onclick="addUser()" style="width:100%; margin-bottom:10px; background:var(--flex-purple); color:white; cursor:pointer;">추가</button>
            <div id="userList"></div>
        </div>

        <div id="board"></div>

        <div class="sidebar">
            <h3>🏆 TOP 5 횟수</h3>
            <div id="leaderboard"></div>
        </div>
    </div>

    <div class="log-box" id="logBox">
        <div style="color:var(--flex-pink); font-weight:bold; margin-bottom:5px;">📑 결과 히스토리</div>
    </div>

    <div id="effectOverlay"></div>
    <audio id="tickSnd" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
    let rewards = [];
    let userStats = {};
    let activeUser = null;
    const TOTAL = 520;
    const tickSnd = document.getElementById("tickSnd");

    function init() {
        const savedBoard = localStorage.getItem("eb_board_v3");
        const savedStats = localStorage.getItem("eb_stats_v3");
        
        if (savedBoard) rewards = JSON.parse(savedBoard);
        else resetRewards();

        if (savedStats) userStats = JSON.parse(savedStats);
        
        renderBoard();
        renderUserList();
        updateLeaderboard();
        updateStats();
    }

    function resetRewards() {
        let temp = [...Array(1).fill("🥇 1등"), ...Array(3).fill("🥈 2등"), ...Array(15).fill("🥉 3등"), ...Array(80).fill("🏅 4등")];
        while (temp.length < TOTAL) temp.push("❌ 꽝");
        rewards = temp.sort(() => Math.random() - 0.5);
        localStorage.setItem("eb_board_v3", JSON.stringify(rewards));
    }

    function addUser() {
        const name = document.getElementById("newUserField").value.trim();
        if (name && !userStats[name]) {
            userStats[name] = 0;
            saveAll();
            renderUserList();
            document.getElementById("newUserField").value = "";
        }
    }

    function selectUser(name) {
        activeUser = name;
        document.getElementById("currentUserDisplay").innerText = `🎤 현재 참여자: ${name}`;
        renderUserList();
    }

    function renderUserList() {
        const list = document.getElementById("userList");
        list.innerHTML = "";
        Object.keys(userStats).forEach(name => {
            const div = document.createElement("div");
            div.className = "user-item" + (activeUser === name ? " active" : "");
            div.innerText = name;
            div.onclick = () => selectUser(name);
            list.appendChild(div);
        });
    }

    function openCell(idx) {
        if (!activeUser) { showPopup("참여자를 먼저 선택해주세요!", "error"); return; }
        if (rewards[idx].startsWith("O_")) { showPopup("이미 뽑은 번호!", "error"); return; }

        const result = rewards[idx];
        rewards[idx] = "O_" + result;
        userStats[activeUser]++;
        
        saveAll();
        addHistory(activeUser, idx + 1, result);

        if (!result.includes("꽝")) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            showPopup(`${result}! 🎉`, "win");
        } else {
            showPopup(`꽝!`, "miss");
        }
        
        renderBoard();
        updateLeaderboard();
        updateStats();
    }

    function addHistory(user, num, res) {
        const box = document.getElementById("logBox");
        const entry = document.createElement("div");
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `<span style="color:#666">[${time}]</span> <b>${user}</b>님 ${num}번 👉 ${res}`;
        box.prepend(entry);
    }

    function startRoulette() {
        if (!activeUser) { showPopup("참여자를 선택하세요!", "error"); return; }
        let avail = [];
        rewards.forEach((r, i) => { if (!r.startsWith("O_")) avail.push(i); });
        if (avail.length === 0) return;
        
        let count = 0, spins = 20;
        const cells = document.querySelectorAll(".cell");
        const timer = setInterval(() => {
            document.querySelectorAll(".highlight").forEach(c => c.classList.remove("highlight"));
            let rIdx = avail[Math.floor(Math.random() * avail.length)];
            cells[rIdx].classList.add("highlight");
            tickSnd.currentTime = 0; tickSnd.play().catch(()=>{});
            if (++count > spins) { clearInterval(timer); openCell(rIdx); }
        }, 60);
    }

    function updateLeaderboard() {
        const board = document.getElementById("leaderboard");
        board.innerHTML = "";
        const sorted = Object.entries(userStats).sort((a, b) => b[1] - a[1]).slice(0, 5);
        sorted.forEach((item, i) => {
            const div = document.createElement("div");
            div.className = "rank-item";
            div.innerHTML = `<span style="color:var(--gold)">${i+1}위</span> <span>${item[0]}</span> <span>${item[1]}회</span>`;
            board.appendChild(div);
        });
    }

    function updateStats() {
        document.getElementById("totalLeft").innerText = rewards.filter(r => !r.startsWith("O_")).length;
        document.getElementById("cnt1").innerText = rewards.filter(r => r === "🥇 1등").length;
        document.getElementById("cnt2").innerText = rewards.filter(r => r === "🥈 2등").length;
        document.getElementById("cnt3").innerText = rewards.filter(r => r === "🥉 3등").length;
    }

    function renderBoard() {
        const board = document.getElementById("board");
        board.innerHTML = "";
        rewards.forEach((res, i) => {
            const div = document.createElement("div");
            div.className = "cell";
            if (res.startsWith("O_")) {
                div.classList.add("open");
                const val = res.replace("O_", "").split(" ")[1];
                div.innerText = val === "꽝" ? "꽝" : val;
                div.classList.add(val === "꽝" ? "miss-text" : "win-text");
            } else {
                div.innerText = i + 1;
                div.onclick = () => openCell(i);
            }
            board.appendChild(div);
        });
    }

    function manualPick() {
        const val = parseInt(document.getElementById("targetNum").value);
        if (val >= 1 && val <= TOTAL) openCell(val - 1);
        document.getElementById("targetNum").value = "";
    }

    function saveAll() {
        localStorage.setItem("eb_board_v3", JSON.stringify(rewards));
        localStorage.setItem("eb_stats_v3", JSON.stringify(userStats));
    }

    function resetBoard() {
        if (confirm("새 게임을 시작할까요?")) {
            resetRewards();
            location.reload();
        }
    }

    function showPopup(msg, type) {
        const ov = document.getElementById("effectOverlay");
        ov.innerText = msg;
        ov.className = "show " + (type === "win" ? "msg-win" : type === "error" ? "msg-error" : "msg-miss");
        setTimeout(() => ov.classList.remove("show"), 1500);
    }

    init();
</script>
</body>
</html>
