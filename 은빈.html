<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEX TV 뽑기판</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --flex-purple: #6a11cb; --flex-pink: #ff00ea; --gold: #ffcc00; --silver: #e0e0e0; --bronze: #cd7f32; --bg: #0a0a0a;
            --p-light: #ffd1dc; --p-hover: #ffb6c1; --wine: #800020;
            --banner-image: url('https://nwqkk6zh13414.edge.naverncp.com/etc/19g61lvamalrr.jpg');
            --hidden-image: url('https://i.ibb.co/39hYdDxh/image.png'); 
        }

        body { background-color: var(--bg); color: white; font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .top-banner { width: 100%; max-width: 1000px; height: 160px; background: var(--banner-image) no-repeat center/contain; margin-bottom: 5px; }

        .settings-panel { background: rgba(20, 20, 20, 0.98); border: 2px solid var(--flex-purple); padding: 20px; border-radius: 15px; margin-bottom: 15px; width: 90%; max-width: 600px; display: none; z-index: 100; position: fixed; top: 80px; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .settings-panel.show { display: block; }
        .settings-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .settings-row input[type="text"] { flex: 3; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; }
        .settings-row input[type="number"] { flex: 1; background: #000; border: 1px solid var(--flex-purple); color: var(--gold); padding: 8px; border-radius: 5px; text-align: center; }

        .dashboard { background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 50px; border: 2px solid var(--flex-purple); margin-bottom: 10px; display: flex; gap: 20px; align-items: center; }
        .stat-item strong { color: var(--gold); font-size: 1.1em; }

        .controls { margin-bottom: 10px; }
        button { padding: 6px 15px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; margin: 0 3px; }
        .btn-set { background: #333; color: white; }
        .btn-pick { background: var(--flex-purple); color: white; }
        .btn-random { background: var(--flex-pink); color: white; }

        .main-container { display: flex; width: 98vw; justify-content: center; gap: 12px; align-items: flex-start; }
        .sidebar { width: 170px; background: rgba(0,0,0,0.9); border: 1px solid #333; border-radius: 10px; padding: 10px; height: 620px; overflow-y: auto; }
        
        #board { display: grid; grid-template-columns: repeat(20, 1fr); gap: 2px; width: 55vw; min-width: 650px; background: var(--hidden-image) center/cover; padding: 5px; background-color: #000; border-radius: 8px; }
        
        /* [핵심 수정] 둥근 네모 + 와인색 글씨 + 흰색 테두리 */
        .cell { 
            aspect-ratio: 1/1; 
            background: var(--p-light); 
            color: var(--wine); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 13x; 
            font-weight: 900; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 5px; /* 살짝 둥글게 */
            /* 와인색 글씨를 돋보이게 하는 흰색 테두리 */
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            transition: all 0.1s ease;
        }

        .cell:hover { 
            background: var(--p-hover); 
            transform: scale(1.15); z-index: 5; 
            border-radius: 10px;
        }

        .cell.open { background: rgba(0,0,0,0.6) !important; color: transparent; text-shadow: none !important; border-radius: 2px; }

        /* 당첨 등수 스타일 */
        .rank-1 { color: var(--gold) !important; font-weight: bold; font-size: 11px; text-shadow: 0 0 8px #000, 0 0 5px var(--gold) !important; }
        .rank-2 { color: var(--silver) !important; font-weight: bold; font-size: 11px; text-shadow: 0 0 8px #000, 0 0 5px var(--silver) !important; }
        .rank-3 { color: var(--bronze) !important; font-weight: bold; font-size: 11px; text-shadow: 0 0 8px #000, 0 0 5px var(--bronze) !important; }
        .rank-4 { color: #ff99ff !important; font-weight: bold; font-size: 11px; text-shadow: 0 0 8px #000 !important; }
        .rank-miss { color: #888 !important; font-size: 9px; font-weight: normal; opacity: 0.7; text-shadow: none !important; }

        .highlight { background: var(--wine) !important; color: #fff !important; transform: scale(1.4); z-index: 10; border-radius: 50%; box-shadow: 0 0 20px var(--wine); text-shadow: none !important; }
        .log-box { width: 90%; max-width: 1000px; margin-top: 10px; background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 10px; padding: 10px; height: 90px; overflow-y: auto; font-size: 12px; }
        #effectOverlay { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); z-index:9999; padding:40px; border-radius:20px; text-align:center; transition:0.3s; pointer-events:none; }
    </style>
</head>
<body>
    <div class="top-banner"></div>
    <div class="settings-panel" id="settingsPanel">
        <h3 style="margin-top:0; color:var(--gold); text-align:center;">⚙️ 상품 명칭 및 수량 설정</h3>
        <div class="settings-row"><span>1등:</span><input type="text" id="gift1"><input type="number" id="count1"></div>
        <div class="settings-row"><span>2등:</span><input type="text" id="gift2"><input type="number" id="count2"></div>
        <div class="settings-row"><span>3등:</span><input type="text" id="gift3"><input type="number" id="count3"></div>
        <div class="settings-row"><span>4등:</span><input type="text" id="gift4"><input type="number" id="count4"></div>
        <button onclick="saveSettings()" style="background:var(--flex-purple); color:white; width:100%; padding:10px; margin-top:10px;">설정 저장하기</button>
    </div>

    <div class="dashboard">
        <button class="btn-set" onclick="toggleSettings()">⚙️ 상품/수량 수정</button>
        <div class="stat-item">남은 칸: <strong id="totalLeft">520</strong></div>
    </div>

    <div class="controls">
        <input id="targetNum" type="number" style="width:70px; padding:8px; background:#000; color:white; border:2px solid var(--flex-purple); text-align:center;" placeholder="번호">
        <button class="btn-pick" onclick="manualPick()">뽑기</button>
        <button class="btn-random" onclick="startRoulette()">🎲 랜덤</button>
        <button class="btn-reset" onclick="resetBoard()" style="font-size:10px; background:#222; color:#777;">판 초기화</button>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <h4 style="text-align:center; color:var(--flex-pink); margin:0 0 5px 0;">참여자</h4>
            <input type="text" id="newUser" style="width:100%; background:#111; color:white; border:1px solid #444; margin-bottom:5px; padding:6px; box-sizing:border-box;" placeholder="닉네임" onkeypress="if(event.keyCode==13) addUser()">
            <div id="userList"></div>
        </div>
        <div id="board"></div>
        <div class="sidebar">
            <h4 style="text-align:center; color:var(--gold); margin:0 0 5px 0;">🎁 상품 현황</h4>
            <div id="giftStatusList" class="gift-status">
                <div class="gift-status-item" style="color:var(--gold)">1등: <strong id="gCnt1">0</strong></div>
                <div class="gift-status-item" style="color:var(--silver)">2등: <strong id="gCnt2">0</strong></div>
                <div class="gift-status-item" style="color:var(--bronze)">3등: <strong id="gCnt3">0</strong></div>
                <div class="gift-status-item" style="color:#ff99ff">4등: <strong id="gCnt4">0</strong></div>
            </div>
            <h4 style="text-align:center; color:var(--flex-pink); margin:10px 0 5px 0;">🏆 TOP 5</h4>
            <div id="leaderboard"></div>
        </div>
    </div>
    <div class="log-box" id="logBox"></div>
    <div id="effectOverlay"></div>

<script>
    // 스크립트 로직은 이전과 동일하게 유지 (init, openCell, renderBoard 등)
    let rewards = []; let userStats = {}; let activeUser = null;
    let gifts = { g1: "🥇 1등", c1: 1, g2: "🥈 2등", c2: 3, g3: "🥉 3등", c3: 15, g4: "🏅 4등", c4: 80 };
    const TOTAL = 520;

    function init() {
        const sGifts = localStorage.getItem("eb_v8_gifts");
        if (sGifts) gifts = JSON.parse(sGifts);
        updateGiftDisplay();
        const sBoard = localStorage.getItem("eb_v8_board");
        const sStats = localStorage.getItem("eb_v8_stats");
        if (sBoard) rewards = JSON.parse(sBoard); else resetRewards();
        if (sStats) userStats = JSON.parse(sStats);
        renderBoard(); renderUserList(); updateLeaderboard(); updateStats();
    }

    function toggleSettings() { document.getElementById("settingsPanel").classList.toggle("show"); }
    function saveSettings() {
        gifts.g1 = document.getElementById("gift1").value; gifts.c1 = parseInt(document.getElementById("count1").value) || 0;
        gifts.g2 = document.getElementById("gift2").value; gifts.c2 = parseInt(document.getElementById("count2").value) || 0;
        gifts.g3 = document.getElementById("gift3").value; gifts.c3 = parseInt(document.getElementById("count3").value) || 0;
        gifts.g4 = document.getElementById("gift4").value; gifts.c4 = parseInt(document.getElementById("count4").value) || 0;
        localStorage.setItem("eb_v8_gifts", JSON.stringify(gifts));
        updateGiftDisplay(); toggleSettings(); updateStats();
        alert("저장되었습니다.");
    }
    function updateGiftDisplay() {
        document.getElementById("gift1").value = gifts.g1; document.getElementById("count1").value = gifts.c1;
        document.getElementById("gift2").value = gifts.g2; document.getElementById("count2").value = gifts.c2;
        document.getElementById("gift3").value = gifts.g3; document.getElementById("count3").value = gifts.c3;
        document.getElementById("gift4").value = gifts.g4; document.getElementById("count4").value = gifts.c4;
    }
    function resetRewards() {
        let temp = [...Array(gifts.c1).fill("R1_"+gifts.g1), ...Array(gifts.c2).fill("R2_"+gifts.g2), ...Array(gifts.c3).fill("R3_"+gifts.g3), ...Array(gifts.c4).fill("R4_"+gifts.g4)];
        while (temp.length < TOTAL) temp.push("MISS_❌ 꽝");
        rewards = temp.sort(() => Math.random() - 0.5);
        localStorage.setItem("eb_v8_board", JSON.stringify(rewards));
    }
    function addUser() {
        const name = document.getElementById("newUser").value.trim();
        if (name && !userStats[name]) { userStats[name] = 0; saveAll(); renderUserList(); document.getElementById("newUser").value = ""; }
    }
    function selectUser(name) { activeUser = name; renderUserList(); }
    function renderUserList() {
        const list = document.getElementById("userList"); list.innerHTML = "";
        Object.keys(userStats).forEach(name => {
            const div = document.createElement("div");
            div.style.cssText = `padding:8px; margin:5px 0; background:${activeUser===name?'var(--flex-purple)':'#111'}; border-radius:5px; cursor:pointer; text-align:center; font-size:13px; font-weight:bold; border:1px solid ${activeUser===name?'#fff':'#333'};`;
            div.innerText = name; div.onclick = () => selectUser(name); list.appendChild(div);
        });
    }
    function openCell(idx) {
        if (!activeUser) { showPopup("참여자를 선택하세요!", "error"); return; }
        if (rewards[idx].startsWith("O_")) return;
        const raw = rewards[idx]; rewards[idx] = "O_" + raw; userStats[activeUser]++; saveAll();
        let cleanText = "", rankClass = "";
        if (raw.startsWith("R1_")) { cleanText = raw.replace("R1_", ""); rankClass = "rank-1"; fire(3); }
        else if (raw.startsWith("R2_")) { cleanText = raw.replace("R2_", ""); rankClass = "rank-2"; fire(1); }
        else if (raw.startsWith("R3_")) { cleanText = raw.replace("R3_", ""); rankClass = "rank-3"; fire(1); }
        else if (raw.startsWith("R4_")) { cleanText = raw.replace("R4_", ""); rankClass = "rank-4"; }
        else { cleanText = "꽝"; rankClass = "rank-miss"; }
        addLog(activeUser, idx+1, cleanText); showPopup(cleanText + (rankClass==="rank-miss"?"":"! 🎉"), rankClass);
        renderBoard(); updateLeaderboard(); updateStats();
    }
    function fire(n) { for(let i=0; i<n; i++) setTimeout(()=>confetti({particleCount:100, spread:70, origin:{y:0.6}}), i*300); }
    function renderBoard() {
        const board = document.getElementById("board"); board.innerHTML = "";
        rewards.forEach((res, i) => {
            const div = document.createElement("div"); div.className = "cell";
            if (res.startsWith("O_")) {
                div.classList.add("open"); let val = res.replace("O_", "");
                if (val.startsWith("R1_")) { div.innerText = val.replace("R1_", "").split(" ")[1] || "1등"; div.classList.add("rank-1"); }
                else if (val.startsWith("R2_")) { div.innerText = val.replace("R2_", "").split(" ")[1] || "2등"; div.classList.add("rank-2"); }
                else if (val.startsWith("R3_")) { div.innerText = val.replace("R3_", "").split(" ")[1] || "3등"; div.classList.add("rank-3"); }
                else if (val.startsWith("R4_")) { div.innerText = val.replace("R4_", "").split(" ")[1] || "4등"; div.classList.add("rank-4"); }
                else { div.innerText = "꽝"; div.classList.add("rank-miss"); }
            } else { div.innerText = i + 1; div.onclick = () => openCell(i); }
            board.appendChild(div);
        });
    }
    function addLog(user, num, res) {
        const box = document.getElementById("logBox"); const entry = document.createElement("div");
        entry.innerHTML = `<span style="color:#666">[${new Date().toLocaleTimeString()}]</span> <b style="color:var(--wine); text-shadow: 0.5px 0.5px 0 #fff;">${user}</b>님 <span style="color:var(--gold)">${num}번</span> 👉 ${res}`;
        box.prepend(entry);
    }
    function startRoulette() {
        if (!activeUser) { showPopup("참여자를 선택하세요!", "error"); return; }
        let avail = rewards.map((r, i) => r.startsWith("O_") ? -1 : i).filter(i => i !== -1);
        if (avail.length === 0) return;
        let count = 0, spins = 20;
        const timer = setInterval(() => {
            document.querySelectorAll(".highlight").forEach(c => c.classList.remove("highlight"));
            let rIdx = avail[Math.floor(Math.random() * avail.length)];
            document.querySelectorAll(".cell")[rIdx].classList.add("highlight");
            if (++count > spins) { clearInterval(timer); openCell(rIdx); }
        }, 60);
    }
    function updateStats() {
        document.getElementById("totalLeft").innerText = rewards.filter(r => !r.startsWith("O_")).length;
        document.getElementById("gCnt1").innerText = rewards.filter(r => r.startsWith("R1_")).length;
        document.getElementById("gCnt2").innerText = rewards.filter(r => r.startsWith("R2_")).length;
        document.getElementById("gCnt3").innerText = rewards.filter(r => r.startsWith("R3_")).length;
        document.getElementById("gCnt4").innerText = rewards.filter(r => r.startsWith("R4_")).length;
    }
    function updateLeaderboard() {
        const b = document.getElementById("leaderboard"); b.innerHTML = "";
        Object.entries(userStats).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach((item, i) => {
            const d = document.createElement("div"); d.style.cssText = "display:flex; justify-content:space-between; font-size:12px; padding:4px 0; border-bottom:1px solid #222;";
            d.innerHTML = `<span style="color:var(--gold)">${i+1}위</span> <span>${item[0]}</span> <span>${item[1]}회</span>`;
            b.appendChild(d);
        });
    }
    function manualPick() { const v = parseInt(document.getElementById("targetNum").value); if (v>=1 && v<=TOTAL) openCell(v-1); document.getElementById("targetNum").value=""; }
    function saveAll() { localStorage.setItem("eb_v8_board", JSON.stringify(rewards)); localStorage.setItem("eb_v8_stats", JSON.stringify(userStats)); }
    function resetBoard() { if(confirm("판을 초기화할까요?")) { resetRewards(); location.reload(); } }
    function showPopup(m, c) {
        const o = document.getElementById("effectOverlay"); o.innerText = m;
        o.className = "";
        o.style.cssText = `position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(1); background:rgba(0,0,0,0.95); border:4px solid ${c==='rank-1'?'var(--gold)':c==='rank-2'?'var(--silver)':c==='rank-3'?'var(--bronze)':c==='rank-4'?'var(--flex-pink)':'#555'}; color:white; font-size:45px; padding:50px; border-radius:20px; z-index:9999; transition:0.3s; font-weight:900;`;
        if (c === "rank-1") o.style.color = "var(--gold)";
        setTimeout(() => o.style.transform = "translate(-50%,-50%) scale(0)", 1500);
    }
    init();
</script>
</body>
</html>
